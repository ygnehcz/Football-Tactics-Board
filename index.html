<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>足球排兵布阵战术板</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ====== 顶部标题 ====== -->
  <header class="app-header">
    <h1>⚽ 足球排兵布阵战术板</h1>
  </header>

  <!-- ====== 控制区 ====== -->
  <section class="controls">
    <div class="control-row">
      <label for="playerCount">人数：</label>
      <select id="playerCount">
        <option value="5">5人制</option>
        <option value="7">7人制</option>
        <option value="8">8人制</option>
        <option value="11" selected>11人制</option>
      </select>
    </div>

    <div class="control-row">
      <label for="formation">阵型：</label>
      <select id="formation"></select>
    </div>

    <div class="control-row">
      <label for="langToggle">位置：</label>
      <select id="langToggle">
        <option value="en">EN</option>
        <option value="zh" selected>中文</option>
      </select>
    </div>

    <div class="control-row buttons-row">
      <button id="btnReset">🔄 重置阵型</button>
      <button id="btnExport">📸 导出图片</button>
      <button id="btnSave">💾 保存阵型</button>
      <button id="btnLoad">📂 加载阵型</button>
      <button id="btnColorToggle">🎨 切换队服</button>
      <button id="btnTeamInfo">📋 队伍信息</button>
      <button id="btnResetBall">⚽ 重置足球</button>
    </div>
  </section>

  <!-- ====== 导出区域（含队伍信息 + 球场） ====== -->
  <div id="exportArea">

    <!-- 队伍信息展示条 -->
    <div class="team-info-bar" id="teamInfoBar">
      <div class="team-info-left">
        <span class="team-name-home" id="tiHomeName">主队</span>
        <span class="team-vs" id="tiVs">vs</span>
        <span class="team-name-away" id="tiAwayName">客队</span>
      </div>
      <div class="team-info-right">
        <span class="team-info-detail" id="tiComp">--</span>
        <span class="team-info-detail" id="tiDate">--</span>
        <span class="team-info-detail" id="tiCoach">--</span>
      </div>
    </div>

    <!-- 球场区域 -->
    <div class="field-wrapper" id="fieldWrapper">
      <div class="field" id="field">

        <!-- 导出标签（导出时显示） -->
        <div class="export-label" id="exportLabel"></div>

        <!-- SVG 球场标线层 -->
        <svg class="field-lines" viewBox="0 0 100 100" preserveAspectRatio="none">
          <!-- 外边线 -->
          <rect x="2" y="2" width="96" height="96" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="0.4"/>
          <!-- 中线 -->
          <line x1="2" y1="50" x2="98" y2="50" stroke="rgba(255,255,255,0.9)" stroke-width="0.4"/>
          <!-- 中圈 -->
          <circle cx="50" cy="50" r="9" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="0.4"/>
          <!-- 中点 -->
          <circle cx="50" cy="50" r="0.8" fill="rgba(255,255,255,0.9)"/>

          <!-- 上方大禁区 -->
          <path d="M 24 2 L 24 18 L 76 18 L 76 2" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="0.4"/>
          <!-- 上方小禁区 -->
          <path d="M 37 2 L 37 9 L 63 9 L 63 2" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="0.4"/>
          <!-- 上方罚球点 -->
          <circle cx="50" cy="13" r="0.7" fill="rgba(255,255,255,0.9)"/>
          <!-- 上方罚球弧 -->
          <path d="M 41 18 A 9 9 0 0 0 59 18" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="0.4"/>
          <!-- 上方球门 -->
          <rect x="42" y="2" width="16" height="2" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.9)" stroke-width="0.3"/>

          <!-- 下方大禁区 -->
          <path d="M 24 98 L 24 82 L 76 82 L 76 98" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="0.4"/>
          <!-- 下方小禁区 -->
          <path d="M 37 98 L 37 91 L 63 91 L 63 98" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="0.4"/>
          <!-- 下方罚球点 -->
          <circle cx="50" cy="87" r="0.7" fill="rgba(255,255,255,0.9)"/>
          <!-- 下方罚球弧 -->
          <path d="M 41 82 A 9 9 0 0 1 59 82" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="0.4"/>
          <!-- 下方球门 -->
          <rect x="42" y="96" width="16" height="2" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.9)" stroke-width="0.3"/>

          <!-- 角球弧 -->
          <path d="M 2 5 A 3 3 0 0 1 5 2" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="0.35"/>
          <path d="M 98 5 A 3 3 0 0 0 95 2" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="0.35"/>
          <path d="M 2 95 A 3 3 0 0 0 5 98" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="0.35"/>
          <path d="M 98 95 A 3 3 0 0 1 95 98" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="0.35"/>
        </svg>

        <!-- 球员容器 -->
        <div class="players-container" id="playersContainer"></div>

        <!-- 足球 -->
        <div class="ball" id="ball" data-ball="true"></div>

        <!-- 进攻方向指示 -->
        <div class="attack-direction">
          <span>⬆ 进攻方向 ⬆</span>
        </div>
      </div>
    </div>

  </div><!-- /exportArea -->

  <!-- ====== 底部说明 ====== -->
  <footer class="app-footer">
    <p>🖐 拖动球员调整位置 &nbsp;|&nbsp; 👆 双击球员编辑信息 &nbsp;|&nbsp; ⚽ 足球可拖动</p>
  </footer>

  <!-- ====== 编辑球员弹窗 ====== -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-dialog">
      <div class="modal-header">
        <h2>✏️ 编辑球员</h2>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="editNumber">球衣号码</label>
          <input type="number" id="editNumber" min="1" max="99" placeholder="1-99" inputmode="numeric">
        </div>
        <div class="form-group">
          <label for="editName">球员姓名</label>
          <input type="text" id="editName" placeholder="可选，如：梅西" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="editPosition">场上位置</label>
          <select id="editPosition">
            <option value="GK">GK 门将</option>
            <option value="CB">CB 中后卫</option>
            <option value="LB">LB 左后卫</option>
            <option value="RB">RB 右后卫</option>
            <option value="LWB">LWB 左翼卫</option>
            <option value="RWB">RWB 右翼卫</option>
            <option value="CDM">CDM 防守中场</option>
            <option value="CM">CM 中场</option>
            <option value="CAM">CAM 攻击中场</option>
            <option value="LM">LM 左中场</option>
            <option value="RM">RM 右中场</option>
            <option value="LW">LW 左边锋</option>
            <option value="RW">RW 右边锋</option>
            <option value="ST">ST 前锋</option>
            <option value="CF">CF 中锋</option>
            <option value="SS">SS 影锋</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" id="btnCancelEdit" class="btn-cancel">取消</button>
        <button type="button" id="btnSaveEdit" class="btn-save">保存</button>
      </div>
    </div>
  </div>

  <!-- ====== 队伍信息弹窗 ====== -->
  <div class="modal-overlay" id="teamInfoModal">
    <div class="modal-dialog modal-dialog-wide">
      <div class="modal-header">
        <h2>📋 编辑队伍信息</h2>
      </div>
      <div class="modal-body modal-body-scroll">
        <div class="form-group">
          <label for="tiTeamName">队伍名称</label>
          <input type="text" id="tiTeamName" placeholder="如：红魔联队" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="tiShortName">队伍简称</label>
          <input type="text" id="tiShortName" placeholder="如：红魔" autocomplete="off" maxlength="6">
        </div>
        <div class="form-group">
          <label for="tiSide">主/客队</label>
          <select id="tiSide">
            <option value="home">主队</option>
            <option value="away">客队</option>
          </select>
        </div>
        <div class="form-group">
          <label for="tiOpponent">对手名称</label>
          <input type="text" id="tiOpponent" placeholder="如：蓝狮军团" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="tiCompetition">赛事名称</label>
          <input type="text" id="tiCompetition" placeholder="如：2026 夏季联赛" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="tiMatchDate">比赛日期</label>
          <input type="date" id="tiMatchDate">
        </div>
        <div class="form-group">
          <label for="tiVenue">场地</label>
          <input type="text" id="tiVenue" placeholder="如：市中心体育场" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="tiCoach">主教练</label>
          <input type="text" id="tiCoach" placeholder="如：张教练" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="tiCaptain">队长</label>
          <input type="text" id="tiCaptain" placeholder="如：10号" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="tiNotes">备注</label>
          <input type="text" id="tiNotes" placeholder="如：雨天、草地湿滑" autocomplete="off">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" id="btnCancelTeamInfo" class="btn-cancel">取消</button>
        <button type="button" id="btnSaveTeamInfo" class="btn-save">保存</button>
      </div>
    </div>
  </div>

  <!-- ====== Toast 提示容器 ====== -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- html2canvas CDN -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <!-- 主逻辑 -->
  <script src="app.js"></script>
</body>
</html>
